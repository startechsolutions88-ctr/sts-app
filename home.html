<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  body { 
    background-color: #ffffff; 
    font-family: 'Segoe UI', sans-serif; 
    text-align: center; 
    padding: 0; 
    margin: 0; 
    color: #1e293b; 
    padding-top: 90px; 
  }
  
  /* Static Header */
  .header { 
    background: linear-gradient(135deg, #1a365d 0%, #2563eb 100%); 
    padding: 15px; 
    color: white; 
    position: fixed; 
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  
  .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; margin-right: 12px; }
  .title-group { text-align: left; } 
  .logo-text { font-weight: 900; font-size: 18px; margin: 0; text-transform: uppercase; line-height: 1.2; }
  .tagline { font-size: 11px; opacity: 0.9; font-weight: 600; }
  
  .container { padding: 15px 20px; }

  /* ATTRACTIVE BUTTON STYLES */
  .btn { 
    width: 100%; padding: 15px; margin: 10px 0; 
    text-decoration: none; border-radius: 14px; 
    font-weight: 700; display: flex; align-items: center; 
    justify-content: center; font-size: 13px; 
    text-transform: uppercase; box-sizing: border-box;
    transition: transform 0.2s;
  }

  /* Phone Doctor: Medical Theme */
  .btn-doctor { 
    background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
    color: white !important;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
    border: 2px solid #fee2e2;
  }

  /* Price Estimator: Gold/Financial Theme */
  .btn-estimator { 
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white !important;
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    border: 2px solid #fef3c7;
  }

  .btn-main { background-color: #1a365d; color: white !important; }
  .btn-sec { background-color: #f8fafc; color: #1a365d !important; border: 1px solid #e2e8f0; }
  .btn-call { background-color: #22c55e; color: white !important; }

  .btn i { margin-right: 12px; font-size: 18px; }
  .hot-label { font-size: 9px; background: white; color: #b91c1c; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }

  .footer { color: #94a3b8; font-size: 10px; margin: 40px 0; font-weight: 600; line-height: 1.5; }
</style>
</head>
<body>

  <div class="header">
    <img src="https://i.postimg.cc/zGx8yQmZ/Sts-logo.png" class="logo-img" alt="Star Tech Logo">
    <div class="title-group">
      <div class="logo-text">STAR TECH</div>
      <div class="tagline">Solutions Ltd</div>
    </div>
  </div>

  <div class="container">
    <a href="go:Services" class="btn btn-main"><i class="fas fa-tools"></i> Our Services</a>
    <a href="go:Products" class="btn btn-main"><i class="fas fa-shopping-basket"></i> Our Store</a>
    
    <a href="go:Doctor" class="btn btn-doctor">
      <i class="fas fa-user-md"></i> Phone Doctor <span class="hot-label">DIAGNOSE</span>
    </a>
    
    <a href="go:Calculator" class="btn btn-estimator">
      <i class="fas fa-calculator"></i> Price Estimator <span class="hot-label" style="color:#d97706">2026 RATES</span>
    </a>
    
    <a href="go:Contact Us" class="btn btn-call"><i class="fas fa-phone-alt"></i> Contact Us</a>
    <a href="go:Offices" class="btn btn-sec"><i class="fas fa-map-marker-alt"></i> Find Our Shop</a>
    <a href="https://startechsolutions.netlify.app" class="btn btn-sec"><i class="fas fa-globe"></i> Visit Our Website</a>

    <div class="footer">
      Founded by Levas Kamwajo in 2025<br>
      Star Tech Solutions Ltd Private Limited Company
    </div>
  </div>

</body>
</html>
