<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  body {
    background-color: #f1f5f9;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
    margin: 0;
    text-align: center;
  }
  .contact-title {
    color: #1a365d;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 25px;
  }
  .contact-card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    margin-bottom: 20px;
  }
  .contact-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    color: white !important;
    font-size: 16px;
    transition: 0.2s;
  }
  .whatsapp { background-color: #25d366; }
  .call { background-color: #1a365d; }
  .email { background-color: #ef4444; }
  
  .contact-btn i { margin-right: 15px; font-size: 20px; }
  
  .info-text {
    color: #64748b;
    font-size: 14px;
    margin-top: 20px;
    line-height: 1.6;
  }
  .shop-id {
    font-weight: bold;
    color: #1a365d;
    display: block;
    margin-top: 10px;
  }
</style>
</head>
<body>

  <h2 class="contact-title">Get In Touch</h2>

  <div class="contact-card">
    <i class="fas fa-headset" style="font-size: 40px; color: #1a365d; margin-bottom: 15px;"></i>
    <p class="info-text">Have a tech problem? Our team is ready to help you now.</p>
    
    <a href="https://wa.me/260972570250" class="contact-btn whatsapp">
      <i class="fab fa-whatsapp"></i> WhatsApp Us
    </a>

    <a href="tel:0972570250" class="contact-btn call">
      <i class="fas fa-phone-alt"></i> Call Support
    </a>

    <a href="mailto:Startechsolutions88@gmail.com" class="contact-btn email">
      <i class="fas fa-envelope"></i> Send Email
    </a>
  </div>

  <div class="info-text">
    <strong>Star Tech Solutions Ltd</strong><br>
    Nakambala Market, Mazabuka<br>
    <span class="shop-id">Shop No: 227</span>
  </div>

  <a href="go:Home" style="display:block; margin-top:30px; color:#1a365d; text-decoration:none; font-weight:bold;">
    

</body>
</html>
